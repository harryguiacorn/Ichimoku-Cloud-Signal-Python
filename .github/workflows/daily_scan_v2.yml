name: Daily Ichimoku Scans - All Markets

on:
  schedule:
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        market:
          - { name: 'DJ30', script: 'runDJ30.py' }
          # - { name: 'SP500', script: 'runSP500.py' }
          - { name: 'NASDAQ', script: 'runNASDAQ.py' }
          # - { name: 'Russell2000', script: 'runRussell2000.py' }
          # ... add all 16 markets
      max-parallel: 1  # Forces sequential execution
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: master
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Ichimoku Scanner - ${{ matrix.market.name }}
      run: python ${{ matrix.market.script }}
    
    - name: Pull latest changes
      run: git pull origin master
    
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add --all
        
        if git diff --staged --quiet; then
          echo "No changes to commit for ${{ matrix.market.name }}"
          exit 0
        fi
        
        git commit -m "Daily updates Github Action - ${{ matrix.market.name }}"
        
        # Retry with pull if push fails
        MAX_RETRIES=3
        for i in $(seq 1 $MAX_RETRIES); do
          if git push origin HEAD:master; then
            echo "Push successful"
            exit 0
          else
            echo "Push failed, retrying..."
            git pull --rebase origin master
            sleep 5
          fi
        done
        exit 1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
