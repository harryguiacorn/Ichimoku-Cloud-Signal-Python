name: Daily Ichimoku Scan - Currency Futures

on:
  schedule:
    - cron: '15 21 * * 1-5' # 21:15 UTC, Monday–Friday only
  workflow_dispatch:      # Allows you to click "Run Now" button manually

permissions:
  contents: write         # Gives permission to save the new scan results back to the repo

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Python (CI)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    # 3. Install your libraries (CI)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run your Scan (CD)
    - name: Run Ichimoku Scanner - Currency Futures
      run: |
        python runCurrencyFutures.py

    # 5. Save results back to GitHub (CD)
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git status
        git add --all
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Daily updates Github Action - Currency Futures"
        git push origin HEAD:master

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
